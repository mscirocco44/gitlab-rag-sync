services:

  # ── Local AI stack ──────────────────────────────────────────────────

  ollama:
    image: ollama/ollama
    container_name: ollama
    runtime: nvidia            # remove this line if you have no GPU
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "3000:8080"
    restart: unless-stopped

  # ── GitLab (remove this block if using a remote GitLab instance) ────

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: always
    hostname: localhost
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
    ports:
      - "80:80"
      - "443:443"
      - "2222:22"
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    shm_size: '256m'

  # ── GitLab RAG sync ─────────────────────────────────────────────────
  #
  # One service block per GitLab project you want to index.
  # Each needs:
  #   - a unique service name and container_name
  #   - its own .env file with a unique KNOWLEDGE_NAME
  #
  # For a remote GitLab instance:
  #   - set GITLAB_URL to your GitLab host (e.g. http://gitlab.company.com)
  #   - remove the depends_on condition for gitlab

  # Example: single repo, local GitLab
  gitlab-rag-sync:
    build: gitlab-rag
    container_name: gitlab-rag-sync
    restart: always
    depends_on:
      open-webui:
        condition: service_healthy
      gitlab:
        condition: service_healthy
    env_file:
      - gitlab-rag/.env
    environment:
      GITLAB_URL: "http://gitlab"
      OPENWEBUI_URL: "http://open-webui:8080"
      SYNC_INTERVAL: "3600"

  # Example: second repo, same local GitLab (uncomment to use)
  # gitlab-rag-sync-project-b:
  #   build: gitlab-rag
  #   container_name: gitlab-rag-sync-project-b
  #   restart: always
  #   depends_on:
  #     open-webui:
  #       condition: service_healthy
  #     gitlab:
  #       condition: service_healthy
  #   env_file:
  #     - gitlab-rag/project-b.env
  #   environment:
  #     GITLAB_URL: "http://gitlab"
  #     OPENWEBUI_URL: "http://open-webui:8080"
  #     SYNC_INTERVAL: "3600"

  # Example: repo on a remote GitLab instance (uncomment to use)
  # gitlab-rag-sync-remote:
  #   build: gitlab-rag
  #   container_name: gitlab-rag-sync-remote
  #   restart: always
  #   depends_on:
  #     open-webui:
  #       condition: service_healthy
  #   env_file:
  #     - gitlab-rag/remote.env
  #   environment:
  #     GITLAB_URL: "http://your-gitlab-host"
  #     OPENWEBUI_URL: "http://open-webui:8080"
  #     SYNC_INTERVAL: "3600"

volumes:
  ollama_data:
  open_webui_data:
  gitlab_config:
  gitlab_logs:
  gitlab_data:

